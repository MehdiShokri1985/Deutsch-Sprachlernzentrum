<!doctype html>
<html lang="de" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png">
    <link rel="icon" href="assets/icons/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
    <title id="pageTitle">German Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/userDisplay.js?v=1"></script>
    <script>
      (function(){
        var U='https://sesltisebtcijdsdeckr.supabase.co',K='sb_publishable_RPND2s4rdjF8ORhD-7bDiA_wkpSscWm';
        try {
          var c=(window.Auth&&window.Auth.client)||supabase.createClient(U,K);
          c.auth.getSession().then(function(r){
            if(!(r.data&&r.data.session)){window.location.replace('login.html')}
          });
        } catch(e) {window.location.replace('login.html')}
      })();
    </script>
    <style>
      .loader-overlay{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,rgba(30,27,75,0.88) 0%,rgba(15,23,42,0.96) 100%);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transition:opacity .55s ease;opacity:1;pointer-events:auto}
      .loader-overlay.loader-hidden{opacity:0;pointer-events:none}
      .loader-rings{position:relative;width:64px;height:64px;margin-bottom:32px}
      .loader-rings .ring{position:absolute;inset:0;border-radius:50%;border:2.5px solid transparent;will-change:transform}
      .loader-rings .ring:nth-child(1){border-top-color:#6366f1;animation:loader-spin 1.2s cubic-bezier(.5,0,.5,1) infinite}
      .loader-rings .ring:nth-child(2){inset:8px;border-right-color:#8b5cf6;animation:loader-spin 1.6s cubic-bezier(.5,0,.5,1) infinite reverse}
      .loader-rings .ring:nth-child(3){inset:16px;border-bottom-color:#a78bfa;animation:loader-spin 2s cubic-bezier(.5,0,.5,1) infinite}
      @keyframes loader-spin{to{transform:rotate(360deg)}}
      .loader-text{color:rgba(255,255,255,.9);font-size:1.1rem;font-weight:500;letter-spacing:.03em}
      .loader-sub{color:rgba(255,255,255,.4);font-size:.85rem;margin-top:10px;font-weight:400;transition:opacity .4s ease}
    </style>
    <link rel="stylesheet" href="css/word-progress-squares.css" />
    <link rel="stylesheet" href="css/game-responsive.css" />
    <link rel="stylesheet" href="css/module-themes.css" />
    <link rel="stylesheet" href="css/game-theme.css" />
       
    <style>
      @keyframes fall {
        from {
          transform: translateY(-100px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .modal-overlay {
        backdrop-filter: blur(4px);
      }
      .custom-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scroll::-webkit-scrollbar-thumb {
        background-color: #64748b;
        border-radius: 20px;
      }

         .pronunciation {
                font-size: 0.9rem;
                color: #6200ff;
                font-style: italic;
                unicode-bidi: plaintext;
                font-weight: 400;
            }

    </style>
  </head>
  <body
    class="game-page module-themed min-h-screen font-sans overflow-x-hidden"
  >
    <div id="loader" class="loader-overlay" role="status" aria-label="Ladevorgang">
      <div class="loader-rings">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
      </div>
      <div class="loader-text">Daten werden geladen...</div>
      <div class="loader-sub" id="loaderSub">Lernfortschritt wird synchronisiert</div>
    </div>
    <script>
      window.loaderReady=function(){var e=document.getElementById('loader');if(e)e.classList.add('loader-hidden')};
      window.loaderShow=function(t,s){var e=document.getElementById('loader');if(e){e.classList.remove('loader-hidden');if(t||s!==void 0)window.loaderStatus(t,s)}};
      window.loaderStatus=function(t,s){var e=document.querySelector('.loader-text');if(e&&t)e.textContent=t;var n=document.getElementById('loaderSub');if(n&&s!==void 0)n.textContent=s};
    </script>
    <!-- Header -->
    <header class="bg-white shadow">
      <div class="container mx-auto px-4 py-2">
        <div class="game-header-inner flex justify-between items-center flex-wrap">
          <!-- عنوان قابل کلیک -->
          <a
            href="index.html"
            id="headerTitle"
            class="game-header-title font-bold transition-colors flex items-center gap-2"
          >
            German Learning
          </a>

          <div class="flex items-center gap-2 sm:gap-3">
            <a href="stats.html" class="stats-nav-link hidden sm:inline-flex">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 20V10M12 20V4M6 20v-6" />
              </svg>
              Stats
            </a>
            <div id="userProfileContainer"></div>
            <div class="game-header-stats flex gap-1 sm:gap-3 md:gap-4 text-xs md:text-sm">
              <div class="bg-green-100 px-3 py-1 rounded-full">
                <span class="text-green-800 font-semibold">
                  <span id="correctCount">0</span></span
                >
              </div>
              <div
                id="wrongCounter"
                class="bg-red-100 px-3 py-1 rounded-full cursor-pointer hover:bg-red-200 active:bg-red-300 transition-colors"
              >
                <span class="text-red-800 font-semibold">
                  <span id="wrongCount">0</span></span
                >
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Progress Bar -->
    <div class="container mx-auto px-4 py-2">
      <div class="game-progress-card bg-white rounded-lg shadow">
        <div class="flex justify-between items-center mb-2">
          <span class="text-sm font-medium text-gray-700"
            >Mastery-Fortschritt</span
          >
          <span class="text-sm text-gray-600"
            ><span id="masteryProgress">0</span>% Abschließen</span
          >
        </div>
        <div class="w-full theme-progress-track rounded-full h-2">
          <div
            id="progressBar"
            class="h-2 rounded-full transition-all duration-300"
            style="width: 0%"
          ></div>
        </div>

        <div class="mt-3 text-xs text-gray-600">
          <!-- Row 1: Niveau + Modus -->
          <div class="flex flex-wrap items-center justify-between gap-x-5 gap-y-3 mb-3">
            <div class="flex flex-wrap items-center gap-x-5 gap-y-3">
              <div class="flex items-center gap-2">
                <span class="font-medium text-gray-700 whitespace-nowrap"
                  >Niveau:</span
                >
                <select
                  id="levelSelect"
                  class="theme-input bg-white border rounded-lg px-3 py-1.5 text-sm font-semibold focus:outline-none"
                >
                  <option value="A1">A1</option>
                  <option value="A2">A2</option>
                  <option value="B1">B1</option>
                  <option value="B2">B2</option>
                  <option value="C1">C1</option>
                  <option value="C2">C2</option>
                </select>
              </div>

              <div class="flex items-center gap-2" style="display:none">
                <span class="font-medium text-gray-700 whitespace-nowrap"
                  >Modus:</span
                >
                <select
                  id="modeSelect"
                  class="theme-input bg-white border rounded-lg px-3 py-1.5 text-sm font-semibold focus:outline-none"
                >
                  <option value="normal">Normal</option>
                  <option value="hard" selected>Hard</option>
                </select>
              </div>

              <div id="tailSelectContainer" class="flex items-center gap-2 hidden">
                <span class="font-medium text-gray-700 whitespace-nowrap"
                  >Teil:</span
                >
                <select
                  id="tailSelect"
                  class="theme-input bg-white border rounded-lg px-3 py-1.5 text-sm font-semibold focus:outline-none"
                >
                  <option value="all">Alle</option>
                </select>
              </div>
            </div>

            <button
              id="resetBtn"
              class="shrink-0 text-red-500 hover:text-gray-600 hover:bg-gray-100 p-2 rounded-lg transition-all text-sm font-medium"
              title="Fortschritt zurücksetzen"
            >
              ↺
            </button>
          </div>

          <!-- Row 2: Statistics -->
          <div
            id="levelStats"
            class="game-level-stats font-medium text-[13px] px-3 sm:px-4 py-1 rounded-xl border text-center"
          >
            <!-- JavaScript این قسمت را پر می‌کند -->
          </div>
        </div>
      </div>
    </div>

    <!-- Game Area -->
    <main class="container mx-auto px-3 sm:px-4 pb-4">
      <div class="max-w-4xl mx-auto min-w-0 w-full">
        <!-- Word Progress Squares -->
         <div id="wordProgressSquares" class="mb-1.5 hidden"></div>
        <div id="panel"
          class="game-panel bg-white rounded-2xl shadow mb-3 flex items-center justify-center"
        >
          <div id="wordDisplay" class="text-center w-full min-w-0 px-1">
            <div
              id="fallingWord"
              class="falling-word"
            >
             Klicke hier, um zu beginnen.
            </div>
            <div
              id="sentenceDisplay"
              dir="rtl"
              class="text-gray-600 mt-2 hidden"
            ></div>
            <div id="questionType" class="text-sm text-gray-500 mt-2"></div>
          </div>
        </div>

        <div
          id="autocompleteList"
          class="hidden mb-2 w-full min-w-0"
          role="listbox"
          aria-label="Wortvorschläge"
        ></div>

        <!-- Normal Mode Answers -->
        <div
          id="answerOptions"
          class="grid grid-cols-2 md:grid-cols-4 gap-2 sm:gap-3 md:gap-4 mb-3 w-full min-w-0"
        ></div>


              <!-- Result View (Inline) -->
      <div id="resultModal" class="hidden bg-white rounded-2xl shadow p-2 sm:p-3  w-full min-w-0 max-w-full">
        <div class="text-center min-w-0">
          <div id="modalIcon" class="leading-none"></div>
          <h2 id="modalTitle" class="font-bold"></h2>
          <div id="modalDetails" class="bg-gray-50 rounded-lg px-2.5 py-1.5 mb-1.5 text-left text-sm leading-snug max-w-full overflow-hidden"></div>
          <div class="game-result-actions flex flex-wrap justify-center mt-0.5 w-full">
            <button id="sureBtn" class="game-result-btn game-result-btn--sure">
              Ja, sicher
            </button>
            <button id="maybeBtn" class="game-result-btn game-result-btn--maybe">
              Nicht sicher
            </button>
            <button
              id="practiceAgainBtn"
              type="button"
              class="hidden game-result-btn game-result-btn--practice w-full max-w-[11rem]"
            >
              Noch einmal üben
            </button>
            <button
              id="continueBtn"
              type="button"
              class="hidden game-result-btn game-result-btn--practice w-full max-w-[11rem]"
            >
              Continue
            </button>
          </div>
        </div>
      </div>


        <!-- Hard Mode Input -->
        <div id="hardInputContainer" class="hidden mb-6">
          <div class="max-w-md mx-auto">
            <div class="flex gap-2 mb-3">
              <button
                onclick="game.setAutoCompleteMode(1)"
                id="ac1"
                class="theme-ac-btn flex-1 py-2 text-xs font-medium rounded-lg border-2 transition-all"
              >
                Nach 1. Buchstabe
              </button>
              <button
                onclick="game.setAutoCompleteMode(2)"
                id="ac2"
                class="theme-ac-btn flex-1 py-2 text-xs font-medium rounded-lg border-2 transition-all"
              >
                Nach 2. Buchstabe
              </button>
              <button
                onclick="game.setAutoCompleteMode(0)"
                id="ac0"
                class="theme-ac-btn flex-1 py-2 text-xs font-medium rounded-lg border-2 transition-all"
              >
                Nur vollständig
              </button>
            </div>

            <div class="flex gap-3">
              <input
                id="hardInput"
                type="text"
                class="theme-hard-input theme-input flex-1 min-w-0 border-2 rounded-xl px-3 sm:px-5 py-2 sm:py-3 focus:outline-none"
                placeholder="Deutsches Wort eingeben..."
                autocomplete="off"
              />
              <button
                id="submitBtn"
                onclick="game.submitHardAnswer()"
                class="theme-btn-primary hidden text-white px-8 rounded-xl font-medium transition-all"
              >
                Prüfen
              </button>
            </div>
          </div>
        </div>

    
      </div>
    </main>

    <!-- Modals -->
    <div
      id="modeModal"
      class="game-overlay-modal fixed inset-0 bg-black bg-opacity-50 modal-overlay hidden flex items-center justify-center z-50 p-3"
    >
      <div class="game-overlay-panel bg-white rounded-3xl shadow-2xl p-5 sm:p-8 max-w-md w-full mx-auto overflow-y-auto">
        <h2 class="theme-modal-title text-2xl font-bold text-center mb-6">
          Wähle Spielmodus
        </h2>
        <div class="space-y-4">
          <button
            onclick="game.selectMode('normal')"
            class="theme-mode-card w-full p-6 border-2 border-gray-200 rounded-2xl text-left transition-all group"
          >
            <div class="theme-mode-card-title font-semibold text-lg">
              Normal Mode
            </div>
            <div class="text-gray-600 text-sm">
              4 Auswahlmöglichkeiten (Multiple Choice)
            </div>
          </button>
          <button
            onclick="game.selectMode('hard')"
            class="theme-mode-card w-full p-6 border-2 border-gray-200 rounded-2xl text-left transition-all group"
          >
            <div class="theme-mode-card-title font-semibold text-lg">
              Hard Mode (Typing)
            </div>
            <div class="text-gray-600 text-sm">
              Wort selbst eintippen + Autocomplete
            </div>
          </button>
        </div>
      </div>
    </div>



    <!-- Mistakes Modal -->
    <div
      id="mistakesModal"
      class="game-overlay-modal fixed inset-0 bg-black bg-opacity-50 modal-overlay hidden items-center justify-center z-50 p-3"
    >
      <div
        class="game-overlay-panel bg-slate-50 rounded-2xl shadow-2xl p-4 sm:p-6 max-w-sm mx-auto w-full overflow-hidden flex flex-col border border-slate-200"
      >
        <h2
          class="text-lg font-bold mb-4 text-amber-600 flex items-center gap-2"
        >
          Meine Fehler
        </h2>
        <div
          id="mistakesList"
          class="space-y-3 max-h-[60vh] overflow-auto pr-2 text-[14.5px] custom-scroll"
        ></div>
        <div class="mt-auto pt-4 border-t border-slate-200">
          <button
            id="closeMistakesBtn"
            class="w-full bg-slate-700 hover:bg-slate-800 text-white py-3 rounded-2xl font-medium text-sm transition-all"
          >
            Schließen
          </button>
       
        </div>
      </div>
    </div>

      <!-- Description Popup -->
  <div id="descriptionPopup" class="game-overlay-modal fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center z-50 p-3">
    <div class="game-overlay-panel bg-white rounded-2xl shadow-2xl p-4 sm:p-6 max-w-md mx-auto w-full overflow-hidden flex flex-col border border-white/30">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-bold">Erklärung</h2>
        <button id="closeDescriptionBtn" class="text-gray-400 hover:text-gray-600 text-2xl font-bold leading-none">&times;</button>
      </div>
      <div id="descriptionContent" class="flex-1 overflow-auto pr-2 custom-scroll leading-relaxed" dir="rtl" style="text-align:right;font-size:0.8rem;line-height:1.8;white-space:pre-wrap"></div>
    </div>
  </div>

      <!-- Word Details Popup (Isolated) -->
  <div id="wordDetailsPopup" class="game-overlay-modal fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center z-50 p-3">
    <div class="game-overlay-panel bg-white rounded-2xl shadow-2xl p-4 sm:p-6 max-w-md mx-auto w-full overflow-hidden flex flex-col border border-white/30">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-bold">Word Details</h2>
        <button id="closeWordDetailsBtn" class="text-gray-400 hover:text-gray-600 text-2xl font-bold leading-none">&times;</button>
      </div>
      <div id="wordDetailsContent" class="flex-1 overflow-auto pr-2 text-sm custom-scroll"></div>
    </div>
  </div>
    <script type="module" src="js/main.js?v=1"></script>
  </body>
</html>
